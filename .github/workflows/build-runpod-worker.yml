name: Build and Deploy RunPod Worker

on:
  push:
    branches: [main, master]
    paths:
      - runpod-worker/**
      - .github/workflows/build-runpod-worker.yml
  pull_request:
    branches: [main, master]
    paths:
      - runpod-worker/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate handler syntax
        run: |
          python -m py_compile runpod-worker/handler.py
          python -m py_compile runpod-worker/test_handler.py

      - name: Lint Dockerfile (non-blocking)
        continue-on-error: true
        run: |
          docker run --rm -i hadolint/hadolint < runpod-worker/Dockerfile.optimized

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.RUNPOD_API_KEY }}" ]; then
            echo "RUNPOD_API_KEY secret is required." >&2
            exit 1
          fi
          if [ -z "${{ secrets.RUNPOD_DOCKER_REPO }}" ]; then
            echo "RUNPOD_DOCKER_REPO secret is required (ex.: seu-usuario/hunyuan3d-2-worker)." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to RunPod Registry
        run: |
          echo "${{ secrets.RUNPOD_API_KEY }}" | docker login registry.runpod.ai -u "${{ secrets.RUNPOD_API_KEY }}" --password-stdin

      - name: Prepare image tags
        id: prep
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_REPO="registry.runpod.ai/${{ secrets.RUNPOD_DOCKER_REPO }}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_REPO}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: runpod-worker
          file: runpod-worker/Dockerfile.optimized
          push: true
          tags: |
            ${{ steps.prep.outputs.image_latest }}
            ${{ steps.prep.outputs.image_sha }}

      - name: Publish deployment summary
        run: |
          {
            echo "## RunPod Worker Image";
            echo "";
            echo "- Latest: ${{ steps.prep.outputs.image_latest }}";
            echo "- Commit tag: ${{ steps.prep.outputs.image_sha }}";
            echo "";
            echo "## Next Step";
            echo "Use a imagem acima no endpoint serverless do RunPod (Custom Container).";
          } >> "$GITHUB_STEP_SUMMARY"

name: Build and Deploy RunPod Worker

on:
  push:
    branches: [ main, master ]
    paths:
      - 'runpod-worker/**'
      - '.github/workflows/build-runpod-worker.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'runpod-worker/**'
  workflow_dispatch:  # Permite execução manual

env:
  IMAGE_NAME: hunyuan3d-2-worker
  REGISTRY: ${{ secrets.RUNPOD_REGISTRY || 'registry.runpod.ai' }}
  REPO_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to RunPod Registry
      if: env.RUNPOD_API_KEY != ''
      run: |
        echo "${{ secrets.RUNPOD_API_KEY }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.RUNPOD_API_KEY }} --password-stdin

    - name: Build Docker image
      run: |
        cd runpod-worker
        docker build \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          .

    - name: Push Docker image
      if: env.RUNPOD_API_KEY != ''
      run: |
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Trigger RunPod Build (alternative)
      if: env.RUNPOD_API_KEY != '' && env.RUNPOD_ENDPOINT_ID != ''
      run: |
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"dockerfile\": \"runpod-worker/Dockerfile\",
            \"imageName\": \"${{ env.IMAGE_NAME }}\",
            \"repository\": \"${{ github.repository }}\",
            \"tag\": \"${{ github.sha }}\"
          }" \
          "https://api.runpod.ai/v2/${{ secrets.RUNPOD_ENDPOINT_ID }}/build"

    - name: Update deployment info
      run: |
        echo "Image built successfully:"
        echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        echo ""
        echo "To deploy on RunPod:"
        echo "1. Go to https://www.runpod.io/console/serverless"
        echo "2. Create new endpoint"
        echo "3. Use image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        echo "4. Configure GPU: A100 (40GB) recommended"
        echo "5. Set volume: /runpod-volume (15GB+)"
        echo "6. Environment: PRELOAD_MODELS=true (optional)"

  test-image:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run basic handler test
      run: |
        echo "Testing handler.py syntax and imports..."
        cd runpod-worker
        python -m py_compile handler.py
        echo "Handler syntax OK"
        
        echo "Checking Dockerfile..."
        docker run --rm hadolint/hadolint < Dockerfile || echo "Hadolint warnings (non-critical)"

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'runpod-worker/'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-push, test-image]
    if: always()
    steps:
    - name: Send notification on failure
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_CHANNEL: deployments
        SLACK_TITLE: "RunPod Worker Build Failed"
        SLACK_MESSAGE: "Build for ${{ github.repository }} failed on commit ${{ github.sha }}"
        SLACK_COLOR: danger

    - name: Send notification on success
      if: success()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_CHANNEL: deployments
        SLACK_TITLE: "RunPod Worker Build Succeeded"
        SLACK_MESSAGE: "Image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} built successfully"
        SLACK_COLOR: good
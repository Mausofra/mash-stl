name: Build and Deploy RunPod Worker

on:
  push:
    branches: [main, master]
    paths:
      - runpod-worker/**
      - .github/workflows/build-runpod-worker.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------
  # Job 1: Validação estática (rápido)
  # ------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: pip install runpod boto3 Pillow

      - name: Run handler tests
        run: cd runpod-worker && python test_handler.py

      - name: Lint Dockerfile (informative)
        continue-on-error: true
        run: |
          docker run --rm -i hadolint/hadolint < runpod-worker/Dockerfile

  # ------------------------------------------------------------
  # Job 2: Build e Push da imagem Docker
  # ------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- CORREÇÃO CRÍTICA: Liberar espaço em disco no GitHub Runner ---
      - name: Free up disk space for heavy AI image
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ] || [ -z "${{ secrets.RUNPOD_DOCKER_REPO }}" ]; then
            echo "Missing required secrets. Please check DOCKERHUB_USERNAME, DOCKERHUB_TOKEN and RUNPOD_DOCKER_REPO." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- MELHORIA: Action oficial do Docker Login ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: prep
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          RAW_REPO="${{ secrets.RUNPOD_DOCKER_REPO }}"
          RAW_REPO="${RAW_REPO#docker.io/}"
          
          if [[ "$RAW_REPO" == */* ]]; then
            NAMESPACE="${RAW_REPO%%/*}"
            REPO_NAME="${RAW_REPO#*/}"
          else
            NAMESPACE="${{ secrets.DOCKERHUB_USERNAME }}"
            REPO_NAME="$RAW_REPO"
          fi
          
          NAMESPACE="${NAMESPACE,,}"
          REPO_NAME="${REPO_NAME,,}"
          IMAGE_REPO="${NAMESPACE}/${REPO_NAME}"
          
          echo "image_latest=${IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_REPO}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: runpod-worker          # A pasta onde estão seus arquivos
          file: runpod-worker/Dockerfile  # O caminho do Dockerfile
          push: true
          tags: |
            ${{ steps.prep.outputs.image_latest }}
            ${{ steps.prep.outputs.image_sha }}
          cache-from: type=gha,ignore-error=true
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Publish deployment summary
        run: |
          {
            echo "## RunPod Worker Image Successfully Built 🚀";
            echo "";
            echo "- Latest Tag: \`${{ steps.prep.outputs.image_latest }}\`";
            echo "- Commit Tag: \`${{ steps.prep.outputs.image_sha }}\`";
            echo "";
            echo "## Next Step";
            echo "Go to your RunPod Serverless dashboard and deploy the Custom Container using the Latest Tag.";
          } >> "$GITHUB_STEP_SUMMARY"
name: Build and Deploy RunPod Worker

on:
  push:
    branches: [main, master]
    paths:
      - runpod-worker/**
      - .github/workflows/build-runpod-worker.yml
  pull_request:
    branches: [main, master]
    paths:
      - runpod-worker/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal dependencies for validation
        run: |
          pip install runpod huggingface_hub Pillow "numpy<2" trimesh pygltflib

      - name: Validate handler syntax
        run: |
          python -m py_compile runpod-worker/handler.py
          python -m py_compile runpod-worker/test_handler.py

      - name: Lint Dockerfile (non-blocking)
        continue-on-error: true
        run: |
          docker run --rm -i hadolint/hadolint < runpod-worker/Dockerfile

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "DOCKERHUB_USERNAME secret is required." >&2
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN secret is required (use Docker Hub access token)." >&2
            exit 1
          fi
          if [ -z "${{ secrets.RUNPOD_DOCKER_REPO }}" ]; then
            echo "RUNPOD_DOCKER_REPO secret is required (ex.: seu-usuario/hunyuan3d-2-worker)." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Prepare image tags
        id: prep
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          RAW_REPO="${{ secrets.RUNPOD_DOCKER_REPO }}"
          RAW_REPO="${RAW_REPO#docker.io/}"

          if [[ "$RAW_REPO" == */* ]]; then
            REPO_NAME="${RAW_REPO#*/}"
          else
            REPO_NAME="$RAW_REPO"
          fi

          NAMESPACE="${{ secrets.DOCKERHUB_USERNAME }}"
          NAMESPACE="${NAMESPACE,,}"
          REPO_NAME="${REPO_NAME,,}"

          IMAGE_REPO="docker.io/${NAMESPACE}/${REPO_NAME}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_REPO}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: runpod-worker
          file: runpod-worker/Dockerfile
          push: true
          tags: |
            ${{ steps.prep.outputs.image_latest }}
            ${{ steps.prep.outputs.image_sha }}

      - name: Publish deployment summary
        run: |
          {
            echo "## RunPod Worker Image";
            echo "";
            echo "- Latest: ${{ steps.prep.outputs.image_latest }}";
            echo "- Commit tag: ${{ steps.prep.outputs.image_sha }}";
            echo "";
            echo "## Next Step";
            echo "Use a imagem acima no endpoint serverless do RunPod (Custom Container).";
          } >> "$GITHUB_STEP_SUMMARY"